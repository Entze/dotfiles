name: Linux

on:
  push:
    paths:
      - "bootstrap.sh"
      - "git/**"
      - "install.sh"
      - "vim/**"
      - "zsh/**"
      - "emacs/**"
      - "*.packages"
    tags:
  workflow_dispatch:

jobs:
  ubuntu_2004:
    name: 🐧 Linux Ubuntu 20.04
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v3
      - name: Run bootstrap.sh
        run: ./bootstrap.sh --verbose --verbose
      - name: Run install.sh
        run: ./install.sh
  ubuntu_2104:
    name: 🐧 Linux Ubuntu 21.04
    runs-on: ubuntu-21.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v3
      - name: Run bootstrap.sh
        run: ./bootstrap.sh --verbose --verbose
      - name: Run install.sh
        run: ./install.sh
